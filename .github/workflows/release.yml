name: Test and Release

on:
  push:
    branches:
      - main

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run linter
        run: bundle exec rubocop
      - name: Run tests
        run: bundle exec rspec
      - name: Run type checking (Sorbet)
        run: bundle exec srb tc
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Check formatting (Syntax Tree)
        run: bundle exec stree check './lib/**/*.rb' './spec/**/*.rb' Guardfile Rakefile './*.gemspec' Gemfile
  rack_compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gemfile:
          - rack_2
          - rack_3
    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec
  version_match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Check version matching
        run: bin/check_version_change
  release:
    needs: [tests, format, rack_compat, version_match]
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release tag
      id-token: write # trusted publishing OIDC token

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Check for version change
        id: version_check
        run: |
          git fetch --tags --force
          if git diff "$(git tag | tail -1)" -- lib/m2m_keygen/version.rb | grep -qE "^\+.*VERSION"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change, skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Release to RubyGems via trusted publishing
        if: steps.version_check.outputs.changed == 'true'
        uses: rubygems/release-gem@v1
