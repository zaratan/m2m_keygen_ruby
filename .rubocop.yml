inherit_from:
  - http://relaxed.ruby.style/rubocop.yml

require:
  - rubocop-faker
  - rubocop-performance
  - rubocop-sorbet

Layout:
  Enabled: false

Style:
  Enabled: false

# `sign`/`validate` are documented public API methods that return booleans;
# renaming them to end with `?` would be a breaking change.
Naming/PredicateMethod:
  Enabled: false

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  DisplayStyleGuide: true
  DisplayCopNames: true
  SuggestExtensions: false
  Exclude:
    - "bin/*"
    - "vendor/**/*"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*.rb"
    - "Guardfile"
    - "config/environments/*.rb"
    - "lib/tasks/*.rake"
    - "m2m_keygen.gemspec"

Gemspec/RequiredRubyVersion:
  Enabled: false
